<!doctype html>
<html lang="PT-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="./assets/logoTXT.svg" type="image/x-icon">
    <link rel="stylesheet" href="./css/style.css" />
    <title>HRFinance</title>
  </head>
  <body>
    <!-- HOME LOGO -->
    <div class="box-home-l ">
      <div class="box-home-logo">
        <img src="./assets/logoTXT.svg" alt="" />
      </div>
    </div>
    <!-- SCREEN LOGIN -->
    <div class="box-login-s displayHidden">
      <div class="box-login-screen">
        <img src="./assets/logoTXT.svg" alt="Lodo do app" />
        
        <div class="box-input">
          <input type="text" placeholder="E-mail" id="emailUser" />
          <input type="text" placeholder="Senha" id="passwordUser" />
          <a href="">Esqueci minha senha</a>
        </div>
        
        <button onclick="login()">ENTRAR</button>
        <p class="msgAlert displayHidden">Credenciais Inválidas</p>
        <div class="btn-register">
          <p>Não tenho conta</p>
          <a onclick="openDrawerRegisterNewUser()" class="register" href="#">Cadastre-se</a>
        </div>
      </div>
    </div>
    <!-- SCREEN REGISTER -->
    <div class="box-register-r displayHidden">
      <div class="box-register-r2">
        <img src="./assets/logoTXT.svg" alt="" />

        <div class="input-data-user-register">
          <h2>Crie sua Conta</h2>
          <input type="text" placeholder="Nome Completo" id="fullNameUser"/>
          <input type="text" placeholder="E-mail" id="emailUser"/>
          <input type="tel" placeholder="Telefone" id="telNumberUser"/>
          <input type="password" placeholder="Senha" id="passwordUser"/>

          <button onclick="register()">CADASTRAR</button>

          <div class="option-login">
            <p>Já possui conta?</p>
            <a onclick="backToLogin()" href="#">Fazer Login</a>
          </div>
        </div>
      </div>
    </div>

    <!-- SCREEN ALL DATA -->
    <div class="box-register-d displayHidden">
    <div class="screen-allData-d ">
      <div class="screen-allData-Display">
       
      </div>

      <div class="display">
        
      </div>

      <ul class="ulListData">
        
        
      </ul>

      <div class="box-add-data">
        <ion-icon name="trash-outline"></ion-icon>
        <div onclick="openGhostDrawer()" class="add">+</div>
        <ion-icon name="exit-outline"></ion-icon>
      </div>
    </div>

    <div class="box-register-r box-register-ghost displayHidden">
    <div class="box-screen-ghost-display-g ">
      <div class="screen-ghost-display">
        <input type="text" placeholder="Transação" id="nameTransaction" />
        <input type="text" placeholder="Valor"  id="valueTransaction"/>

        <div class="transactions-btn-actions">
          <button onclick="setSaida()" class="despesa">Despesa</button>
          <button onclick="setEntrada()" class="receita">Entrada</button>
        </div>

        <button onclick="insertData()" class="btn-register-ghost">REGISTRAR</button>
      </div>
    </div>
    </div>
    <!-- =====================ION-ICON============================= -->
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>

  <script src="./app.js"></script>
  </body>
</html>
